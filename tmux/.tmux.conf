# ╔══════════════════════════════════════════════════════════════╗
# ║                    TMUX CONFIG — Memo                       ║
# ║              Cyberdream + Powerline Style                   ║
# ╚══════════════════════════════════════════════════════════════╝

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🎨  Color Palette (Cyberdream)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#   bg        = #16181a    bgAlt     = #1e2124
#   bgHighl   = #3c4048    fg        = #ffffff
#   grey      = #7b8496    blue      = #5ea1ff
#   green     = #5eff6c    cyan      = #5ef1ff
#   red       = #ff6e5e    yellow    = #f1ff5e
#   magenta   = #bd5eff    orange    = #ffbd5e
#   pink      = #ff5ef1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ⚙️  General Settings
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"     # True color support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # Undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m' # Undercurl colors
setw -g xterm-keys on
set -s escape-time 0                                  # Instant escape (critical for nvim)
set -sg repeat-time 600
set -g history-limit 50000                            # Generous scrollback
set -g focus-events on                                # For nvim autoread
set -g set-clipboard on                               # OSC 52 clipboard

# Prefix — Ctrl+Space (más ergonómico que Ctrl+b)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🖱️  Mouse
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
set -g mouse on
bind m set -g mouse off \; display " Mouse OFF"
bind M set -g mouse on  \; display " Mouse ON"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🪟  Windows & Panes
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on

# Splits intuitivos (abren en el mismo directorio)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Navegación de paneles (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Smart pane switching is handled by vim-tmux-navigator plugin
# (both tmux plugin and nvim plugin must be installed)
# Manual C-hjkl bindings removed to avoid conflicts with the plugin

# Clear CLI (use prefix + C-l since C-l is used by vim-tmux-navigator)
bind C-l send-keys "clear" Enter

# Resize de paneles (con repeat)
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# Maximize/restore pane con <prefix> z (ya es default pero lo menciono)
# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Nueva sesión
bind-key C new-session

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 📋  Copy Mode (vi-style)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
setw -g mode-keys vi

bind Enter copy-mode                                 # Enter copy mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle    # Block selection
bind -T copy-mode-vi Escape send -X cancel

# Clipboard integration (OS-aware via ~/bin/tmux-copy)
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "tmux-copy"

bind p paste-buffer
bind P choose-buffer
bind b list-buffers

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🎨  STATUS BAR — Cyberdream Powerline
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#ffffff,bg=#16181a"

set -g status-left-length 40
set -g status-right-length 150

# ┌─ Left: Session name with powerline arrow
set -g status-left "\
#[fg=#16181a,bg=#5ea1ff,bold]  #S \
#[fg=#5ea1ff,bg=#1e2124,nobold]\
#[fg=#ffffff,bg=#1e2124] #{?client_prefix,#[fg=#ffbd5e] PREFIX,} \
#[fg=#1e2124,bg=#16181a]"

# ┌─ Right: Git branch + Date + Time + Host
set -g status-right "\
#[fg=#1e2124,bg=#16181a]\
#[fg=#5ef1ff,bg=#1e2124]  #(cd #{pane_current_path}; git branch --show-current 2>/dev/null || echo '—') \
#[fg=#3c4048,bg=#1e2124]│\
#[fg=#f1ff5e,bg=#1e2124] 󰃰 %b %d \
#[fg=#3c4048,bg=#1e2124]│\
#[fg=#5ea1ff,bg=#1e2124] 󰥔 %H:%M \
#[fg=#bd5eff,bg=#1e2124]\
#[fg=#16181a,bg=#bd5eff,bold]  #h "

# ┌─ Windows
setw -g window-status-separator ""

# Window (inactive)
setw -g window-status-format "\
#[fg=#16181a,bg=#1e2124]\
#[fg=#7b8496,bg=#1e2124] #I  #W \
#[fg=#1e2124,bg=#16181a]"

# Window (active)
setw -g window-status-current-format "\
#[fg=#16181a,bg=#5ea1ff]\
#[fg=#16181a,bg=#5ea1ff,bold] #I  #W \
#[fg=#5ea1ff,bg=#16181a]"

# ┌─ Pane borders
setw -g pane-border-style "fg=#3c4048"
setw -g pane-active-border-style "fg=#5ea1ff"

# ┌─ Messages & Command line
set -g message-style "fg=#16181a,bg=#5eff6c,bold"
set -g message-command-style "fg=#ffffff,bg=#1e2124"

# ┌─ Mode (copy mode highlight)
setw -g mode-style "fg=#16181a,bg=#f1ff5e,bold"

# ┌─ Clock
setw -g clock-mode-colour "#5ea1ff"
setw -g clock-mode-style 24

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ⚡  Session management & Quick actions
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Fuzzy session switcher — Cyberdream theme (j/k, ctrl-x=kill, ctrl-r=rename)
bind s display-popup -E -w 75% -h 70% "tmux-sessionizer switch"

# Fuzzy window switcher — Cyberdream theme
bind w display-popup -E -w 75% -h 70% "tmux-sessionizer windows"

# Kill sessions (multi-select with tab)
bind X display-popup -E -w 75% -h 70% "tmux-sessionizer kill"

# Rename current session (inline prompt)
bind R command-prompt -I "#S" "rename-session -- '%%'"

# Quick scratchpad popup (toggle terminal)
bind -n M-t display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Quick htop popup
bind -n M-h display-popup -E -w 80% -h 80% "htop"

# Lazygit popup (si lo tienes instalado)
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🔄  Reload
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
bind r source-file ~/.tmux.conf \; display " Config Reloaded!"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🔌  Plugins (TPM)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# 🔍 tmux-fzf: fuzzy finder para todo (sessions, windows, panes, commands)
set -g @plugin 'sainnhe/tmux-fzf'
set -g @tmux-fzf-launch-key 'f'

# 💾 tmux-resurrect: guarda y restaura sesiones después de reboot
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'            # Restaura sesiones de nvim

# 🔄 tmux-continuum: auto-save de sesiones cada 15 min
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# 📎 tmux-yank: mejor clipboard integration
set -g @plugin 'tmux-plugins/tmux-yank'

# 🧭 vim-tmux-navigator: Ctrl+hjkl seamless entre nvim y tmux
set -g @plugin 'christoomey/vim-tmux-navigator'

# 👆 tmux-thumbs: quick copy de URLs, hashes, paths (like vimium)
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key T
set -g @thumbs-alphabet qwerty
set -g @thumbs-command "echo -n {} | tmux-copy"

# 🔎 tmux-fzf-url: abre URLs del terminal con fzf
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-bind 'u'

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🚀  Initialize TPM (keep this at the very bottom)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
run '~/.tmux/plugins/tpm/tpm'
